<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tile Jumper — Engine</title>
    <style>
      html, body { margin: 0; padding: 0; background: #0d0f12; color: #cfd2d6; }
      body { min-height: 100vh; display: grid; place-items: center; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
      .frame { display: flex; flex-direction: column; align-items: center; gap: 8px; }
      canvas { image-rendering: pixelated; image-rendering: crisp-edges; background: #5c94fc; border: 1px solid #1f2329; display: block; }
      .hud { display: flex; gap: 16px; font-size: 12px; opacity: 0.7; }
      #bridge-status[data-state="open"]      { color: #5fd17a; }
      #bridge-status[data-state="connecting"]{ color: #ffd24c; }
      #bridge-status[data-state="closed"],
      #bridge-status[data-state="error"]     { color: #ff6b6b; }
      #bridge-status[data-state="idle"]      { opacity: 0.5; }
    </style>
  </head>
  <body>
    <div class="frame">
      <canvas id="game" width="800" height="480"></canvas>
      <div class="hud">
        <span>← → / A D — move · space / W / ↑ — jump · R — reset</span>
        <span id="bridge-status" data-state="idle">bridge: idle</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
