<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Tile Jumper</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1d24;
      --panel-2: #232733;
      --border: #2d323f;
      --text: #e6e8ec;
      --muted: #8a90a0;
      --accent: #6ea8ff;
      --sky: #87ceeb;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    body {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
    }
    header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    header h1 { font-size: 18px; margin: 0; letter-spacing: 0.5px; }
    header .tag { color: var(--muted); font-size: 12px; }
    header .spacer { flex: 1; }
    header .badge {
      font-size: 11px; color: var(--muted);
      padding: 3px 8px; border: 1px solid var(--border); border-radius: 999px;
    }
    header .badge.ok  { color: #5fd17a; border-color: #2f6b3f; }
    header .badge.err { color: #ff6b6b; border-color: #6b2f2f; }
    header .badge.warn { color: #ffc36b; border-color: #6b552f; }

    main {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(280px, 1fr) minmax(280px, 1fr);
      gap: 1px;
      background: var(--border);
      min-height: 0;
    }
    .pane {
      background: var(--panel);
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }
    .pane h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin: 0;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--panel-2);
    }
    .pane .body { flex: 1; min-height: 0; overflow: auto; }

    /* Game pane */
    #game-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background:
        linear-gradient(180deg, #1a1d24 0%, #11141a 100%);
      height: 100%;
    }
    #game {
      background: var(--sky);
      max-width: 100%;
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 1px solid var(--border);
      border-radius: 4px;
    }

    /* JSON pane */
    #json {
      margin: 0;
      padding: 12px;
      font-family: ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
      font-size: 11.5px;
      line-height: 1.45;
      white-space: pre;
      color: #cfd3dc;
    }

    /* Chat pane */
    #chat { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
    .msg {
      padding: 8px 10px;
      border-radius: 8px;
      max-width: 95%;
      font-size: 13px;
      line-height: 1.4;
    }
    .msg.user { align-self: flex-end; background: #2a3550; }
    .msg.claude { align-self: flex-start; background: var(--panel-2); border: 1px solid var(--border); }
    .msg .who { font-size: 10px; color: var(--muted); margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
    .msg code { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; color: #b8d4ff; }

    footer {
      padding: 6px 14px;
      font-size: 12px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: var(--panel);
      display: flex; gap: 16px;
    }
    footer .ok { color: #5fd17a; }
    footer .err { color: #ff6b6b; }

    header select, header button {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
    }
    header select:hover, header button:hover { border-color: var(--accent); }

    /* Title screen */
    #game-wrap { position: relative; }
    #title-screen {
      position: absolute;
      inset: 12px;
      background: radial-gradient(ellipse at center, rgba(20,30,50,0.92), rgba(8,10,16,0.98));
      border: 1px solid var(--border);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 10;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    #title-screen.hidden { opacity: 0; visibility: hidden; }
    .title-main {
      font-size: 56px;
      font-weight: 800;
      letter-spacing: 4px;
      margin: 0;
      background: linear-gradient(180deg, #ffd24a 0%, #d94a4a 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 4px 12px rgba(0,0,0,0.4);
    }
    .title-sub { color: var(--muted); font-size: 14px; margin: 0; }
    #title-start {
      background: var(--accent);
      color: #0b1220;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #title-start:hover { filter: brightness(1.1); }
    .title-hint { color: #555c6b; font-size: 11px; margin-top: 4px; }

    /* Dev panel */
    #dev-panel {
      position: fixed;
      bottom: 36px;
      right: 12px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      z-index: 20;
      min-width: 260px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #dev-panel[hidden] { display: none; }
    #dev-panel .dev-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    #dev-panel .dev-row { display: flex; gap: 6px; align-items: center; margin: 4px 0; flex-wrap: wrap; }
    #dev-panel .dev-label { color: var(--muted); font-size: 11px; }
    #dev-panel button {
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }
    #dev-panel button:hover { border-color: var(--accent); }
    #dev-panel .dev-hint { color: #555c6b; font-size: 10px; margin-top: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>Tile Jumper</h1>
    <span class="tag">Claude is the level designer</span>
    <span class="spacer"></span>
    <select id="level-select" title="Load a fixture level"></select>
    <button id="sound-test" title="Play a test sound">♪ test</button>
    <span class="badge" id="level-id-badge">no level</span>
    <span class="badge" id="conn-badge">bridge: offline</span>
  </header>

  <main>
    <section class="pane">
      <h2>Game</h2>
      <div class="body" id="game-wrap">
        <canvas id="game" width="1280" height="480"></canvas>
        <div id="title-screen">
          <h1 class="title-main">TILE JUMPER</h1>
          <p class="title-sub">Claude is the level designer.</p>
          <button id="title-start">START ▶</button>
          <p class="title-hint">controls: ← → · space to jump · R to reset</p>
        </div>
      </div>
    </section>

    <section class="pane">
      <h2>Level JSON</h2>
      <div class="body"><pre id="json">loading…</pre></div>
    </section>

    <section class="pane">
      <h2>Claude</h2>
      <div class="body" id="chat"></div>
    </section>
  </main>

  <div id="dev-panel" hidden>
    <div class="dev-title">Dev / Dry-run</div>
    <div class="dev-row">
      <span class="dev-label">Inject loadLevel:</span>
    </div>
    <div class="dev-row" id="dev-inject-buttons"></div>
    <div class="dev-row">
      <button id="dev-clear-log">Clear log</button>
      <button id="dev-show-title">Show title</button>
    </div>
    <div class="dev-hint">Press <kbd>`</kbd> to toggle.</div>
  </div>

  <footer>
    <span id="status">ready</span>
    <span class="spacer" style="flex:1"></span>
    <span>tile: 32px</span>
    <span>controls: ← → / space / R</span>
  </footer>

  <!-- Engine library bundle. Rebuild with `cd engine && npm run build:lib`.
       Exposes window.TileJumper = { Game, Bridge, preloadAssets }. -->
  <script src="../engine/lib/engine.iife.js"></script>

  <script>
    const TILE = 32;

    const TILE_COLORS = {
      ground: "#8b5a2b",
      brick:  "#c8703a",
      pipe:   "#2fa84f",
      coin:   "#ffd24a",
      flag:   "#d94a4a",
      empty:  null,
    };

    const ENEMY_COLORS = {
      goomba:  "#8b4a2b",
      koopa:   "#3aa84f",
      piranha: "#d94a4a",
    };

    // Drop matching PNGs into demo/assets/ and they'll be used automatically.
    // Missing images fall back to colored rects, so demo never breaks.
    const ASSET_PATHS = {
      tiles: {
        ground: "assets/tiles/ground.png",
        brick:  "assets/tiles/brick.png",
        pipe:   "assets/tiles/pipe.png",
        coin:   "assets/tiles/coin.png",
        flag:   "assets/tiles/flag.png",
      },
      enemies: {
        goomba:  "assets/enemies/goomba.png",
        koopa:   "assets/enemies/koopa.png",
        piranha: "assets/enemies/piranha.png",
      },
      player: "assets/player/player.png",
    };

    const sprites = { tiles: {}, enemies: {}, player: null, loaded: 0, attempted: 0 };

    // Sounds: drop .ogg or .mp3 files matching these paths; missing files no-op.
    const SOUND_PATHS = {
      jump:  "assets/sounds/jump.ogg",
      coin:  "assets/sounds/coin.ogg",
      stomp: "assets/sounds/stomp.ogg",
      death: "assets/sounds/death.ogg",
      win:   "assets/sounds/win.ogg",
    };
    const sounds = { clips: {}, loaded: 0, attempted: 0 };

    function loadSound(src) {
      return new Promise((resolve) => {
        const audio = new Audio();
        audio.preload = "auto";
        audio.oncanplaythrough = () => resolve(audio);
        audio.onerror = () => resolve(null);
        audio.src = src;
      });
    }

    async function loadSounds() {
      const jobs = [];
      for (const [key, path] of Object.entries(SOUND_PATHS)) {
        sounds.attempted++;
        jobs.push(loadSound(path).then((a) => { if (a) { sounds.clips[key] = a; sounds.loaded++; } }));
      }
      await Promise.all(jobs);
    }

    // Public API the engine will eventually call: window.demoSound("jump")
    window.demoSound = function (key) {
      const clip = sounds.clips[key];
      if (!clip) return;
      const c = clip.cloneNode();
      c.play().catch(() => {}); // browsers block autoplay until user gesture; ignore
    };

    // Fixtures available to the demo. Add new entries here as Person 2 / Claude
    // generate them; they show up in the header dropdown.
    const FIXTURES = [
      { id: "sample-1",      path: "../fixtures/sample-level.json",       label: "sample-1 (overworld)" },
      { id: "castle-1",      path: "../fixtures/level-castle.json",       label: "castle-1 (fallback)" },
      { id: "underground-1", path: "../fixtures/level-underground.json",  label: "underground-1 (fallback)" },
    ];

    function loadImage(src) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => resolve(null);
        img.src = src;
      });
    }

    async function loadSprites() {
      const jobs = [];
      for (const [key, path] of Object.entries(ASSET_PATHS.tiles)) {
        sprites.attempted++;
        jobs.push(loadImage(path).then((img) => { if (img) { sprites.tiles[key] = img; sprites.loaded++; } }));
      }
      for (const [key, path] of Object.entries(ASSET_PATHS.enemies)) {
        sprites.attempted++;
        jobs.push(loadImage(path).then((img) => { if (img) { sprites.enemies[key] = img; sprites.loaded++; } }));
      }
      sprites.attempted++;
      jobs.push(loadImage(ASSET_PATHS.player).then((img) => { if (img) { sprites.player = img; sprites.loaded++; } }));
      await Promise.all(jobs);
    }

    function renderLevel(ctx, level) {
      const w = level.width * TILE;
      const h = level.height * TILE;
      ctx.canvas.width = w;
      ctx.canvas.height = h;

      // sky
      const sky = ctx.createLinearGradient(0, 0, 0, h);
      sky.addColorStop(0, "#9bd6f5");
      sky.addColorStop(1, "#cfeeff");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, w, h);

      // tiles
      for (let y = 0; y < level.height; y++) {
        for (let x = 0; x < level.width; x++) {
          const t = level.tiles[y]?.[x];
          const color = TILE_COLORS[t];
          if (!color) continue;
          drawTile(ctx, x, y, t, color);
        }
      }

      // enemies
      for (const e of level.enemies ?? []) {
        drawEnemy(ctx, e);
      }

      // player start
      drawPlayer(ctx, level.playerStart);
    }

    function drawTile(ctx, x, y, type, color) {
      const px = x * TILE, py = y * TILE;
      const img = sprites.tiles[type];
      if (img) { ctx.drawImage(img, px, py, TILE, TILE); return; }

      ctx.fillStyle = color;
      if (type === "coin") {
        ctx.beginPath();
        ctx.arc(px + TILE / 2, py + TILE / 2, TILE / 3, 0, Math.PI * 2);
        ctx.fill();
        return;
      }
      if (type === "flag") {
        // pole
        ctx.fillStyle = "#cccccc";
        ctx.fillRect(px + TILE / 2 - 2, py, 4, TILE);
        // banner
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(px + TILE / 2 + 2, py + 4);
        ctx.lineTo(px + TILE, py + 10);
        ctx.lineTo(px + TILE / 2 + 2, py + 16);
        ctx.closePath();
        ctx.fill();
        return;
      }
      ctx.fillRect(px, py, TILE, TILE);
      // subtle top highlight
      ctx.fillStyle = "rgba(255,255,255,0.12)";
      ctx.fillRect(px, py, TILE, 3);
      // outline
      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.strokeRect(px + 0.5, py + 0.5, TILE - 1, TILE - 1);
    }

    function drawEnemy(ctx, e) {
      const px = e.x * TILE, py = e.y * TILE;
      const img = sprites.enemies[e.type];
      if (img) { ctx.drawImage(img, px, py, TILE, TILE); return; }

      ctx.fillStyle = ENEMY_COLORS[e.type] ?? "#888";
      ctx.beginPath();
      ctx.arc(px + TILE / 2, py + TILE / 2, TILE / 2 - 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "white";
      ctx.fillRect(px + 9, py + 11, 4, 4);
      ctx.fillRect(px + 19, py + 11, 4, 4);
    }

    function drawPlayer(ctx, start) {
      if (!start) return;
      const px = start.x * TILE, py = start.y * TILE;
      if (sprites.player) { ctx.drawImage(sprites.player, px, py, TILE, TILE); return; }

      ctx.fillStyle = "#4a7bd9";
      ctx.fillRect(px + 4, py + 2, TILE - 8, TILE - 4);
      ctx.fillStyle = "#ffd9b0";
      ctx.fillRect(px + 8, py + 4, TILE - 16, 8);
    }

    function setStatus(text, kind) {
      const el = document.getElementById("status");
      el.textContent = text;
      el.className = kind ?? "";
    }

    let canvasCtx = null;
    let currentLevel = null;
    let game = null;   // TileJumper.Game instance, or null if bundle missing

    function setLevel(level, source) {
      currentLevel = level;
      if (game) {
        game.loadLevel(level);
      } else {
        renderLevel(canvasCtx, level);  // fallback static renderer
      }
      document.getElementById("json").textContent = JSON.stringify(level, null, 2);
      document.getElementById("level-id-badge").textContent = `level: ${level.id}`;
      const spriteNote = sprites.loaded === 0
        ? " · sprites: none (rects)"
        : ` · sprites: ${sprites.loaded}/${sprites.attempted}`;
      const soundNote = sounds.attempted === 0
        ? ""
        : ` · sounds: ${sounds.loaded}/${sounds.attempted}`;
      const srcNote = source ? ` · via ${source}` : "";
      setStatus(`loaded ${level.id} (${level.width}×${level.height})${srcNote}${spriteNote}${soundNote}`, "ok");
      logLevelLoad(level, source);
    }

    // ---- Transcript log ----
    function logEntry(who, text) {
      const chat = document.getElementById("chat");
      const msg = document.createElement("div");
      msg.className = `msg ${who === "You" ? "user" : "claude"}`;
      const w = document.createElement("div");
      w.className = "who";
      w.textContent = who;
      const body = document.createElement("div");
      body.textContent = text;
      msg.appendChild(w);
      msg.appendChild(body);
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
      // keep log bounded
      while (chat.children.length > 80) chat.removeChild(chat.firstChild);
    }

    function logLevelLoad(level, source) {
      const enemyCount = (level.enemies ?? []).length;
      if (source && source.startsWith("bridge")) {
        logEntry("Claude", `Loaded ${level.id} — ${level.theme}, ${level.width}×${level.height}, ${enemyCount} enemies`);
      } else if (source === "fixture") {
        logEntry("System", `Loaded fixture ${level.id}`);
      } else {
        logEntry("System", `Loaded ${level.id}`);
      }
    }

    function clearLog() {
      document.getElementById("chat").innerHTML = "";
    }

    async function loadAndRender(path) {
      try {
        const res = await fetch(path);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const level = await res.json();
        setLevel(level, "fixture");
      } catch (err) {
        setStatus(`failed to load ${path}: ${err.message} — serve over http (e.g. \`npx serve\`)`, "err");
        document.getElementById("json").textContent = String(err);
      }
    }

    // ---- WebSocket bridge to Person 3's MCP server ----
    // Contract per COORDINATION.md Q-001 (proposed by PR3, pending PR1 ack):
    //   server → browser: { type: "loadLevel", level: Level } — sent after
    //                     every authoring tool call; full snapshot each time.
    //   browser → server: { type: "ready" } on connect; server replies with
    //                     a loadLevel snapshot of the current in-memory level.
    //   port: localhost:8787
    const BRIDGE_URL = "ws://localhost:8787";
    let bridge = null;
    let bridgeReconnectMs = 1000;

    let lastBridgeState = null;
    function setBridgeBadge(state, text) {
      const el = document.getElementById("conn-badge");
      el.className = `badge ${state}`;
      el.textContent = `bridge: ${text}`;
      if (state !== lastBridgeState) {
        if (state === "ok") logEntry("System", "Bridge connected — Claude can now author levels");
        else if (state === "err" && lastBridgeState === "ok") logEntry("System", "Bridge disconnected");
        lastBridgeState = state;
      }
    }

    function handleBridgeMessage(raw) {
      let msg;
      try { msg = JSON.parse(raw); } catch { return; }
      if (msg.type === "loadLevel" && msg.level) {
        setLevel(msg.level, "bridge");
      }
    }

    function connectBridge() {
      setBridgeBadge("warn", "connecting…");
      try {
        bridge = new WebSocket(BRIDGE_URL);
      } catch (err) {
        setBridgeBadge("err", "offline");
        return;
      }
      bridge.addEventListener("open", () => {
        bridgeReconnectMs = 1000;
        setBridgeBadge("ok", "online");
        bridge.send(JSON.stringify({ type: "ready" }));
      });
      bridge.addEventListener("message", (e) => handleBridgeMessage(e.data));
      bridge.addEventListener("close", () => {
        setBridgeBadge("err", "offline");
        setTimeout(connectBridge, bridgeReconnectMs);
        bridgeReconnectMs = Math.min(bridgeReconnectMs * 2, 15000);
      });
      bridge.addEventListener("error", () => {
        // close handler will retry; suppress noise
      });
    }

    function populateLevelSelect() {
      const sel = document.getElementById("level-select");
      sel.innerHTML = "";
      for (const f of FIXTURES) {
        const opt = document.createElement("option");
        opt.value = f.path;
        opt.textContent = f.label;
        sel.appendChild(opt);
      }
      sel.addEventListener("change", (e) => loadAndRender(e.target.value));
    }

    function wireSoundTest() {
      document.getElementById("sound-test").addEventListener("click", () => {
        const keys = Object.keys(sounds.clips);
        if (keys.length === 0) {
          setStatus("no sounds loaded — drop .ogg/.mp3 files into assets/sounds/", "err");
          return;
        }
        const key = keys[Math.floor(Math.random() * keys.length)];
        window.demoSound(key);
        setStatus(`played: ${key}`, "ok");
      });
    }

    function wireTitleScreen() {
      const screen = document.getElementById("title-screen");
      document.getElementById("title-start").addEventListener("click", () => {
        screen.classList.add("hidden");
      });
    }

    function wireDevPanel() {
      const panel = document.getElementById("dev-panel");

      // Toggle on backtick key (ignore when typing in an input)
      document.addEventListener("keydown", (e) => {
        if (e.key !== "`") return;
        const tag = (e.target.tagName || "").toLowerCase();
        if (tag === "input" || tag === "textarea" || tag === "select") return;
        panel.hidden = !panel.hidden;
      });

      // Build inject buttons from FIXTURES so adding a fixture auto-adds a button
      const row = document.getElementById("dev-inject-buttons");
      for (const f of FIXTURES) {
        const btn = document.createElement("button");
        btn.textContent = f.id;
        btn.addEventListener("click", async () => {
          try {
            const res = await fetch(f.path);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const level = await res.json();
            // Route through the bridge handler so we exercise the real code path
            handleBridgeMessage(JSON.stringify({ type: "loadLevel", level }));
          } catch (err) {
            setStatus(`dry-run failed: ${err.message}`, "err");
          }
        });
        row.appendChild(btn);
      }

      document.getElementById("dev-clear-log").addEventListener("click", clearLog);
      document.getElementById("dev-show-title").addEventListener("click", () => {
        document.getElementById("title-screen").classList.remove("hidden");
      });
    }

    async function boot() {
      const canvas = document.getElementById("game");
      canvasCtx = canvas.getContext("2d");
      canvasCtx.imageSmoothingEnabled = false;

      populateLevelSelect();
      wireSoundTest();
      wireTitleScreen();
      wireDevPanel();

      logEntry("System", "Waiting for Claude to author a level…");

      await Promise.all([loadSprites(), loadSounds()]);

      // Hand control of the canvas to the engine if the bundle loaded.
      // Engine handles physics, input, and rendering from here on; we keep
      // the bridge client, JSON pane, log, and dev panel.
      if (typeof TileJumper !== "undefined" && TileJumper.Game) {
        try {
          game = new TileJumper.Game(canvas, {
            tiles: sprites.tiles,
            enemies: sprites.enemies,
            player: sprites.player,
          });
          logEntry("System", "Engine loaded — demo is playable");
        } catch (err) {
          console.error("[demo] engine init failed, falling back to static renderer", err);
          game = null;
        }
      } else {
        logEntry("System", "Engine bundle missing — static viewer mode (rebuild: cd engine && npm run build:lib)");
      }

      await loadAndRender(FIXTURES[0].path);
      connectBridge();
    }

    boot();
  </script>
</body>
</html>
